# TM-INFRA.3 — sshd hardening drop-in for the claude-phone host.
#
# Installed by deploy/scripts/deploy.sh into
# /etc/ssh/sshd_config.d/99-claude-phone.conf. Drop-in files override the
# main sshd_config; the `99-` prefix ensures this file is read last and
# wins on conflicts.
#
# Apply with: deploy.sh runs `sshd -t` (validate) and `systemctl reload
# sshd` after the copy. Never restart sshd from inside an active SSH
# session without `-t` first — a typo here locks the operator out.
#
# AllowUsers intentionally lives elsewhere (operator-specific):
#   /etc/ssh/sshd_config.d/98-allow-users.conf
# This file ships the host-agnostic hardening only.

# Disable root login over SSH — bastion accounts only.
PermitRootLogin no

# Password auth is fail-loud disabled. Pubkey only. A misplaced
# /etc/ssh/sshd_config that re-enables PasswordAuthentication anywhere
# above this drop-in is overridden by the 99- prefix.
PasswordAuthentication no
PubkeyAuthentication yes

# Disable challenge/keyboard-interactive — together with PasswordAuth=no
# this forecloses every non-pubkey auth path. Without these two,
# PasswordAuthentication=no still allows kbd-interactive password
# prompts via PAM on some distros.
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no

# PAM stays on for session/account modules (login record, ulimits) but
# auth modules are bypassed by the directives above.
UsePAM yes

# Brute-force surface reduction.
MaxAuthTries 3
LoginGraceTime 30
MaxSessions 4

# Forbid forwarding primitives the gateway operator never uses; each
# one is an attacker-pivot if a compromised key lands on the box.
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
GatewayPorts no
PermitTunnel no

# A user-supplied environment file can override PATH and inject
# LD_PRELOAD before privileged helpers run. Off.
PermitUserEnvironment no

# No empty passwords ever, regardless of PAM stack state.
PermitEmptyPasswords no

# Quiet idle SSH sessions get killed after ~10 minutes (3 * 200s).
# Defense against forgotten tmux/shell sessions on the bastion.
ClientAliveInterval 200
ClientAliveCountMax 3
