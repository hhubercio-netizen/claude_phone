# TM-INFRA.9 — claude-phone journald drop-in. Deployed to
# /etc/systemd/journald.conf.d/ by deploy.sh::install_journald.
#
# Why a drop-in (not editing journald.conf): drop-ins survive distro
# upgrades that may replace /etc/systemd/journald.conf; ours is named
# 99-* so it sorts after any vendor drop-in and wins on conflict.
#
# Purpose: survive reboots so a crash/restart doesn't erase the audit
# trail that fail2ban (TM-INFRA.4) + claude-phone auth-failure events
# (4.2) depend on. Default journald `Storage=auto` keeps logs only in
# /run/log/journal which is tmpfs — wiped on every boot. Unacceptable
# for an internet-exposed service.
[Journal]
# Persist to /var/log/journal across reboots.
Storage=persistent

# Cap total disk used by the journal at 512 MiB. Sized against
# tracing JSON volume at ~30 sessions × steady-state idle traffic
# (negligible) + occasional auth_failure / WS lifecycle events.
# 512M holds ~weeks of normal activity and >24h under a 1k req/s
# flood, which exceeds anything the box could survive anyway.
SystemMaxUse=512M

# Always leave 2 GiB free on the journal disk so journald never
# wedges the rest of the host into a "disk full" cascade.
SystemKeepFree=2G

# Drop entries older than 30 days regardless of size cap. Aligns
# with the threat-model assumption that incident triage happens
# within ~weeks, not months. Long-term retention is out of scope
# (see 4.9 §1.1: off-host shipping deferred P2).
MaxRetentionSec=30day

# Forward to syslog so fail2ban's claude-phone jail (which uses
# logpath=/var/log/syslog because the journald backend would
# require unit-filtered MATCH selectors that drift easily) sees
# the gateway's auth-failure JSON entries. The cost is one extra
# syslogd write per log line; cheap.
ForwardToSyslog=yes
