# TM-INFRA.4 — claude-phone filter. Parses the auth-failure JSON log
# emitted by the gateway. Format (defined by sub-spec 4.2, consumed
# here):
#   {"timestamp":"<RFC3339>","level":"WARN","fields":{
#       "event":"auth_failure","ip":"<HOST>","correlation_id":"<ulid>",
#       "reason":"<short>"}}
#
# Defensive against drift: if 4.2 changes the JSON shape without
# updating this filter, scripts/fail2ban_filter_test.sh fails in CI.
# Match against the event tag AND ip field — matching only on the
# substring "auth_failure" would risk false positives if the string
# appears anywhere else in the log line (e.g., gateway-emitted error
# message containing the word).

[Definition]
failregex = ^.*"event":"auth_failure".*"ip":"<HOST>".*$
ignoreregex =

# Date format matches tracing-subscriber default RFC3339 emit. Doubled
# % escapes are required by fail2ban's substitution layer.
datepattern = ^.*"timestamp":"%%Y-%%m-%%dT%%H:%%M:%%S
