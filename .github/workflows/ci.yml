name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # TM-CODE.3 — block `.unwrap()` / `panic!()` regressions in prod hot paths.
      - name: TM-CODE.3 — hot-path unwrap/panic gate
        run: bash scripts/check_hot_path_unwrap.sh
      # TM-CODE.5 — block unbounded tokio channels in prod (slow-leak DoS).
      - name: TM-CODE.5 — unbounded-channel gate
        run: bash scripts/check_unbounded_channels.sh

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - run: cargo audit --deny warnings

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      # `npm audit` exits non-zero on high/critical advisories. We scope to
      # production deps; dev tooling (Vite plugins etc.) is allowed to lag.
      - run: npm audit --omit=dev --audit-level=high
