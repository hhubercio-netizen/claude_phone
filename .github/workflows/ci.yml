name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # TM-CODE.3 — block `.unwrap()` / `panic!()` regressions in prod hot paths.
      - name: TM-CODE.3 — hot-path unwrap/panic gate
        run: bash scripts/check_hot_path_unwrap.sh
      # TM-CODE.5 — block unbounded tokio channels in prod (slow-leak DoS).
      - name: TM-CODE.5 — unbounded-channel gate
        run: bash scripts/check_unbounded_channels.sh
      # TM-LEAK.3 — assert WS guards stay symmetric across phone/wrapper
      # routes, or have an explicit asymmetric carveout in the sweep script.
      - name: TM-LEAK.3 — asymmetric WS guards
        run: bash scripts/security_invariants.sh

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - run: cargo audit --deny warnings

  caddyfile:
    name: Caddyfile validate (TM-TLS.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Caddy
        run: |
          set -euxo pipefail
          curl -fsSL -o /tmp/caddy.tar.gz \
            https://github.com/caddyserver/caddy/releases/download/v2.8.4/caddy_2.8.4_linux_amd64.tar.gz
          sudo tar -xzf /tmp/caddy.tar.gz -C /usr/local/bin caddy
          sudo chmod +x /usr/local/bin/caddy
          caddy version
      - name: Validate Caddyfile
        run: caddy validate --config deploy/caddy/Caddyfile --adapter caddyfile

  systemd-unit:
    name: systemd unit validate (TM-INFRA.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # systemd-analyze on ubuntu-latest validates unit-file syntax and
      # semantics. It tolerates a missing ExecStart binary (claude-phone
      # only exists on the deploy host) and surfaces typos / unknown
      # directives, which is exactly the regression class we care about.
      - name: systemd-analyze verify
        run: systemd-analyze verify deploy/systemd/claude-phone-gateway.service

  deploy-scripts:
    name: deploy scripts shellcheck (TM-INFRA.2 etc.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shellcheck is installed by default on ubuntu-latest. Scope is
      # the deploy/ and scripts/ tree — every shell artifact we ship.
      - name: shellcheck deploy/ + scripts/
        run: |
          shopt -s nullglob
          shellcheck -x \
            deploy/scripts/*.sh \
            scripts/*.sh

  cargo-deny:
    name: cargo deny (TM-SUPPLY.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Advisories are covered by the dedicated `cargo-audit` job above.
          # cargo-deny adds licenses / bans / sources on top — splitting the
          # two databases means a transient flake in one (e.g. an unsupported
          # CVSS-4.0 entry in RustSec) doesn't block license/source review.
          command: check licenses bans sources

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      # `npm audit` exits non-zero on high/critical advisories. We scope to
      # production deps; dev tooling (Vite plugins etc.) is allowed to lag.
      - run: npm audit --omit=dev --audit-level=high
